<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OP-ZisK Prover — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="prover.css?v=25" />
<script>
  // apply saved theme before first paint (no flash)
  try { var t = localStorage.getItem("opzisk-theme"); if (t) document.documentElement.setAttribute("data-theme", t); } catch (e) {}
</script>
</head>
<body>
<div id="root"></div>

<!-- production React (fast); no in-browser Babel — JSX is pre-compiled to .js -->
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

<!-- LIVE FEED url -->
<script>window.OPZISK_FEED_URL = "./status.json";</script>

<!-- data + util layers -->
<script src="prover-data.js?v=25"></script>
<script src="prover-util.js?v=25"></script>
<script>window.proverFeed = new ProverFeed();</script>

<!-- pre-compiled components, then app shell (plain JS, no Babel at runtime) -->
<script src="prover-charts.js?v=25"></script>
<script src="prover-app.js?v=25"></script>
</body>
</html>
