<script>

</script>

<!-- LIVE FEED: set this to your public status.json URL (R2/S3/Worker-KV) to
     show real coordinator data. Leave empty "" to run the mock simulation. -->
<script>window.OPZISK_FEED_URL = "./status.json";</script>

<!-- data + util layers (plain JS, websocket-ready). Create window.proverFeed. -->
<script src="prover-data.js?v=24"></script>
<script src="prover-util.js?v=24"></script>
<script>window.proverFeed = new ProverFeed();</script>

<!-- chart components, then app shell -->
<script type="text/babel" src="prover-charts.jsx?v=24"></script>
<script type="text/babel" src="prover-app.jsx?v=24"></script>
